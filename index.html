<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Hit - 拍击绝美一击</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="app">
        <!-- 头部跟随的背景层 -->
        <div id="background-container">
            <div id="room-bg"></div>
        </div>

        <!-- 视频源（隐藏） -->
        <video id="webcam" autoplay playsinline style="display: none;"></video>

        <!-- 游戏层 -->
        <canvas id="game-canvas"></canvas>

        <!-- UI层 -->
        <div id="ui-layer">
            <div id="score-container">
                <div id="score">得分: 0</div>
                <div id="count">捕捉数量: 0</div>
            </div>
            <div id="encyclopedia-btn">📜 图鉴</div>
        </div>

        <!-- 教程引导层 -->
        <div id="tutorial-overlay" class="hidden">
            <div class="tutorial-card">
                <h2>如何玩这个游戏?</h2>
                <div class="tutorial-steps">
                    <div class="step">
                        <div class="step-icon">👀</div>
                        <p><b>1. 观察追踪</b><br>晃动头部，背景房间会随之产生 3D 偏移。</p>
                    </div>
                    <div class="step">
                        <div class="step-icon">👏</div>
                        <p><b>2. 拍掌打击</b><br>看到虫子后，在摄像头前迅速合拢双手进行打击。</p>
                    </div>
                    <div class="step">
                        <div class="step-icon">🎯</div>
                        <p><b>3. 绝美一击</b><br>如果掌心中心点精准重合在虫子正中心，将获得 PERFECT 评分！</p>
                    </div>
                </div>
                <button id="start-tutorial-btn">我准备好了！</button>
            </div>
        </div>

        <!-- 击中反馈容器 -->
        <div id="notification-container"></div>

        <!-- 图鉴弹窗 -->
        <div id="modal" class="hidden">
            <div class="modal-content">
                <h2>虫子图鉴</h2>
                <div id="bug-list"></div>
                <button id="close-modal">关闭</button>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loader">
            <div class="loader-content">
                <div class="spinner"></div>
                <h1>PERFECT HIT</h1>
                <p class="loading-text">游戏加载中...</p>
                <p class="tip">提示：请确保摄像头已开启，AI 正在为您准备 3D 追踪环境</p>
            </div>
        </div>
    </div>
    <script type="module" src="/main.js"></script>
</body>

</html>
